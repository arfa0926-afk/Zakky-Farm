<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ZAKKY CAMERA</title>

<style>
body {
  background: black;
  color: #00ffcc;
  font-family: Arial;
  text-align: center;
}

.box {
  border: 2px solid #00ffcc;
  margin-top: 40px;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px #00ffcc;
}

input, button {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  border: none;
}

button {
  background: #00ffcc;
  font-weight: bold;
}

video {
  width: 90%;
  margin-top: 20px;
  border-radius: 10px;
  display: none;
}
</style>
</head>

<body>

<div class="box">
  <h1>ZAKKY CAMERA 🚀</h1>

  <input id="wa" placeholder="Masukin No WA"><br>

  <button onclick="nyala()">ON</button>
  <button onclick="mati()">OFF</button>

  <p id="status">Camera OFF</p>

  <video id="video" autoplay playsinline></video>
</div>

<script>
let stream = null;

async function nyala() {
  let nomor = document.getElementById("wa").value;

  if (!nomor) {
    alert("Masukin nomor dulu!");
    return;
  }

  let status = document.getElementById("status");

  status.innerText = "📡 Menghubungkan ke " + nomor + "...";

  setTimeout(() => {
    status.innerText = "🔍 Mencari perangkat target...";
  }, 1000);

  setTimeout(async () => {
    status.innerText = "📶 Terhubung (SIMULASI)";
    
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user" }
      });

      let video = document.getElementById("video");
      video.srcObject = stream;
      video.style.display = "block";

      status.innerText = "📷 Kamera target aktif (SIMULASI)";
    } catch {
      status.innerText = "❌ Izin kamera ditolak";
    }
  }, 2500);
}

function mati() {
  if (stream) {
    stream.getTracks().forEach(track => track.stop());
  }

  document.getElementById("video").style.display = "none";
  document.getElementById("status").innerText = "Camera OFF";
}
</script>

</body>
</html>
