<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>ZAKKY CAMERA</title>
  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }
    .box {
      border: 2px solid #00ffcc;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 15px #00ffcc;
      margin-top: 40px;
    }
    input, button {
      padding: 10px;
      border-radius: 10px;
      margin: 10px;
      border: none;
    }
    button {
      background: #00ffcc;
      font-weight: bold;
    }
    video {
      width: 90%;
      margin-top: 20px;
      border: 2px solid #00ffcc;
      border-radius: 10px;
    }
    #status {
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div class="box">
  <h1>ZAKKY CAMERA</h1>

  <input id="wa" placeholder="Masukin No WA"><br>

  <button onclick="nyala()">ON</button>
  <button onclick="mati()">OFF</button>

  <p id="status">Camera OFF</p>

  <video id="video" autoplay playsinline></video>
</div>

<script>
async function nyala() {
  let nomor = document.getElementById("wa").value;
  if (!nomor) {
    alert("Masukin nomor dulu!");
    return;
  }

  document.getElementById("status").innerText = "Menghubungkan...";

  setTimeout(async () => {
    try {
      let stream = await navigator.mediaDevices.getUserMedia({ video: true });
      document.getElementById("video").srcObject = stream;
      document.getElementById("status").innerText = "📷 SIMULASI - Kamera aktif";
    } catch {
      document.getElementById("status").innerText = "Izin kamera ditolak";
    }
  }, 2000);
}

function mati() {
  let video = document.getElementById("video");
  let stream = video.srcObject;

  if (stream) {
    let tracks = stream.getTracks();
    tracks.forEach(track => track.stop());
  }

  video.srcObject = null;
  document.getElementById("status").innerText = "Camera OFF";
}
</script>

</body>
</html>
